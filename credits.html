<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しゃしんのクレジット — ことばカード</title>
  <style>
    body { font-family: "Hiragino Maru Gothic ProN", system-ui, sans-serif; background:#e8f2ee; color:#3a3a3a; margin:0; padding:20px; }
    .wrap { max-width:760px; margin:0 auto; }
    h1 { color:#25786d; font-size:22px; }
    p.lead { color:#5a5a5a; font-size:14px; line-height:1.7; }
    a.back { display:inline-block; margin-bottom:16px; color:#2f9e8f; text-decoration:none; font-weight:bold; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; font-size:13px; }
    th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #eee; vertical-align:top; }
    th { background:#2f9e8f; color:#fff; position:sticky; top:0; }
    td.deck { color:#888; white-space:nowrap; }
    a { color:#2f9e8f; }
    .muted { color:#999; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← もどる</a>
    <h1>しゃしんのクレジット</h1>
    <p class="lead">
      このアプリの写真は <a href="https://commons.wikimedia.org/" target="_blank" rel="noopener">Wikimedia Commons</a> の、
      自由に再利用できるライセンス（クリエイティブ・コモンズ / パブリックドメイン等）の作品を使用しています。
      各写真の作者・ライセンス・出典は以下のとおりです。色・数・形・体のカードは絵文字を使用しています。
    </p>
    <table id="tbl">
      <thead><tr><th>カテゴリ</th><th>カード</th><th>作者</th><th>ライセンス</th></tr></thead>
      <tbody></tbody>
    </table>
    <p class="muted" id="count"></p>
  </div>
  <script>
    const DECK_JA = { animals:"どうぶつ", sea:"うみ", bugs:"むし", food:"たべもの", vehicles:"のりもの", nature:"しぜん" };
    fetch("credits.json").then(r=>r.json()).then(rows=>{
      const tb = document.querySelector("#tbl tbody");
      rows.forEach(c=>{
        const tr = document.createElement("tr");
        const lic = c.license_url
          ? `<a href="${c.license_url}" target="_blank" rel="noopener">${c.license}</a>`
          : c.license;
        const title = c.source
          ? `<a href="${c.source}" target="_blank" rel="noopener">${c.title}</a>`
          : c.title;
        tr.innerHTML = `<td class="deck">${DECK_JA[c.deck]||c.deck}</td>`
          + `<td>${title}</td><td>${c.author}</td><td>${lic}</td>`;
        tb.appendChild(tr);
      });
      document.getElementById("count").textContent = `けい ${rows.length} まいの しゃしん`;
    });
  </script>
</body>
</html>
