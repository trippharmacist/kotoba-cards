<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ことばカード — 英語もまなべる知育フラッシュカード</title>
  <meta name="description" content="日本語と英語が学べる、お子さま向けの無料フラッシュカードアプリ。音声読み上げ・クイズモード付き。">
  <meta name="theme-color" content="#2f9e8f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ことばカード">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ホーム画面 -->
  <main id="home" class="screen">
    <header class="home-header">
      <h1>ことばカード</h1>
      <p class="subtitle">えいごも まなべる フラッシュカード</p>
    </header>
    <div class="home-seg-row">
      <div class="seg big" id="homeLangSeg">
        <button data-v="ja" class="on">🇯🇵 にほんご</button>
        <button data-v="en">🇺🇸 えいご</button>
      </div>
      <div class="seg big" id="homeModeSeg">
        <button data-v="flash" class="on">📖 カード</button>
        <button data-v="quiz">🎯 クイズ</button>
      </div>
    </div>
    <div class="deck-grid" id="deckGrid"></div>
    <footer class="home-footer">
      <button id="settingsBtn" class="text-btn">⚙️ せってい</button>
      <a class="credits-link" href="credits.html">しゃしんのクレジット</a>
    </footer>
  </main>

  <!-- プレイ画面 -->
  <main id="player" class="screen hidden">
    <header class="player-header">
      <button id="closeBtn" class="icon-btn" aria-label="とじる">✕</button>
      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">1 / 10</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <button id="modeBtn" class="icon-btn" aria-label="モードきりかえ">❓</button>
    </header>

    <div class="card-area">
      <!-- フラッシュモード -->
      <div id="flashCard" class="card">
        <div class="card-emoji" id="cardEmoji">🍎</div>
        <div class="card-words">
          <button class="word-main" id="wordMain">りんご <span class="speaker">🔊</span></button>
          <button class="cry-btn hidden" id="cryBtn">🐾 わんわん！</button>
        </div>
      </div>

      <!-- クイズモード（音声出題 → 絵を選ぶ） -->
      <div id="quizCard" class="card hidden">
        <button class="quiz-ask" id="quizAsk" aria-label="もういちど きく">🔊</button>
        <div class="quiz-question" id="quizQuestion">りんごは どれかな？</div>
        <div class="quiz-choices" id="quizChoices"></div>
      </div>
    </div>

    <div class="player-controls">
      <button id="prevBtn" class="ctrl-btn" aria-label="まえへ">◀</button>
      <button id="playBtn" class="play-btn" aria-label="じどうさいせい">▶</button>
      <button id="nextBtn" class="ctrl-btn" aria-label="つぎへ">▶</button>
    </div>
  </main>

  <!-- 設定モーダル -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-box">
      <h2>せってい</h2>
      <div class="setting-row">
        <span class="setting-label">えのしゅるい</span>
        <div class="seg" id="visualSeg">
          <button data-v="photo" class="on">しゃしん</button>
          <button data-v="emoji">えもじ</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">はやさ</span>
        <div class="seg" id="speedSeg">
          <button data-v="slow">ゆっくり</button>
          <button data-v="normal" class="on">ふつう</button>
          <button data-v="fast">はやい</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">シャッフル</span>
        <div class="seg" id="shuffleSeg">
          <button data-v="off" class="on">じゅんばん</button>
          <button data-v="on">ばらばら</button>
        </div>
      </div>
      <button id="settingsClose" class="primary-btn">とじる</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
